name: go-sdk-windowsuup

services:
  winupdate:
    build:
      context: .
      dockerfile: Dockerfile
    image: winupdate:latest
    ports:
      # HTTPS mTLS API
      - "8443:8443"
    volumes:
      # SQLite catalog — persists across restarts
      - ./data:/data
      # TLS certificates — generated by entrypoint on first start,
      # then shared with the host so test-api.sh can use client.crt/client.key.
      - ./certs:/certs
    environment:
      TZ: UTC
      # ADDR:        listen address (default :8443)
      # DB_PATH:     SQLite file (default /data/winupdate.db)
      # CERTS_DIR:   certificate directory (default /certs)
      # NO_WATCHER:  set to "false" to enable background 30-min WU poll loop
      NO_WATCHER: "true"
    healthcheck:
      # /healthz is plain GET, no client cert required — but TLS is mandatory,
      # so we skip cert verification for the health probe only.
      test: ["CMD", "curl", "-sf", "--insecure", "https://localhost:8443/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
